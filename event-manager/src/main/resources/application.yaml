server:
  port: 8080

spring:
  application:
    name: event-manager

  web:
    error:
      whitelabel:
        enabled: false

  datasource:
    #    url: jdbc:postgresql://localhost:5432/event_manager
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    hikari:
      autocommit: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/changelog-master.yaml

logging:
  level:
    root: INFO
    org.springframework.web: INFO

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    path: /swagger-ui/index.html

password:
  policy:
    min-length: 8
    max-length: 255
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special-char: true

jwt:
  secret: ${JWT_SECRET}
  expiration-in-millis: ${JWT_EXPIRATION_MILLIS:86400000}   # 24 hours in milliseconds

default-admin:
  login: ${DEFAULT_ADMIN_LOGIN:admin}
  password: ${DEFAULT_ADMIN_PASSWORD}

event:
  status-scheduler:
    # how often (ms) to advance event statuses WAIT_START -> STARTED -> FINISHED
    fixed-delay-ms: ${EVENT_STATUS_SCHEDULER_DELAY_MS:60000}
    # delay (ms) before the first run after startup
    initial-delay-ms: ${EVENT_STATUS_SCHEDULER_INITIAL_DELAY_MS:10000}
