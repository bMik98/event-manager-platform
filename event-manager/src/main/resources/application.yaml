server:
  port: 8080

spring:
  application:
    name: event-manager

  datasource:
    #    url: jdbc:postgresql://localhost:5432/event_manager
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    hikari:
      autocommit: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/changelog-master.yaml

logging:
  level:
    root: INFO
    org.springframework.web: INFO

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    path: /swagger-ui/index.html

password:
  policy:
    min-length: 8
    max-length: 255
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special-char: true

jwt:
  secret: ZhIzthldLwm1rFCl9wLAV3/yiYohS8FoFF+HFZBeKk0=
  expiration-in-millis: 86400000   # 24 hours in milliseconds
